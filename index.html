<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Verification Check</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f3f5f7;
}

.container{
    width:420px;
    margin:50px auto;
    background:white;
    border-radius:12px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
    box-sizing:border-box;
}

.check{
    margin-top:20px;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    background:#0066ff;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#004dcc;
}

#result{
    display:none;
    text-align:center;
    padding:40px;
}

h1{
    font-size:50px;
    color:red;
}
</style>
</head>

<body>

<div class="container" id="form">

<h2>Profile Verification Check</h2>

<p>Fill up the following details.</p>

<input placeholder="Full Name">

<input type="date">

<input type="email" placeholder="Email Address">

<input placeholder="Phone Number">

<input placeholder="Bank Account Number">

<input placeholder="UPI Id">

<div class="check">
<label>
<input type="checkbox">
I confirm that I grant permission to autodebit the required amount.
</label>

<button onclick="show()">Continue</button>

</div>

<div id="result">

<h1> YOU GOT SCAMMED! </h1>

<h2>Your amount will be debited automatically in 10 Mins.</h2>

<p>
To stop this autodebit contact:- 8825569126
</p>

</div>

<script>

function show(){

document.getElementById("form").style.display="none";
document.getElementById("result").style.display="block";

window.scrollTo(0,0);

}

</script>

</body>
</html>
